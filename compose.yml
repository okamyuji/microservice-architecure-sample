services:
  # ========================================
  # NATS Message Broker
  # ========================================
  nats:
    image: nats:2.10-alpine
    container_name: saga-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--jetstream", "--http_port", "8222"]
    networks:
      - saga-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ========================================
  # Order Service Database
  # ========================================
  order-db:
    image: postgres:16-alpine
    container_name: saga-order-db
    environment:
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_pass
      POSTGRES_DB: order_db
    ports:
      - "5433:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data
      - ./scripts/init-order-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - saga-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order_user -d order_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ========================================
  # Inventory Service Database
  # ========================================
  inventory-db:
    image: postgres:16-alpine
    container_name: saga-inventory-db
    environment:
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_pass
      POSTGRES_DB: inventory_db
    ports:
      - "5434:5432"
    volumes:
      - inventory-db-data:/var/lib/postgresql/data
      - ./scripts/init-inventory-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - saga-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_user -d inventory_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ========================================
  # Payment Service Database
  # ========================================
  payment-db:
    image: postgres:16-alpine
    container_name: saga-payment-db
    environment:
      POSTGRES_USER: payment_user
      POSTGRES_PASSWORD: payment_pass
      POSTGRES_DB: payment_db
    ports:
      - "5435:5432"
    volumes:
      - payment-db-data:/var/lib/postgresql/data
      - ./scripts/init-payment-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - saga-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment_user -d payment_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ========================================
  # Order Service
  # ========================================
  order-service:
    build:
      context: .
      dockerfile: services/order/Dockerfile
    container_name: saga-order-service
    environment:
      DB_HOST: order-db
      DB_PORT: 5432
      DB_USER: order_user
      DB_PASSWORD: order_pass
      DB_NAME: order_db
      NATS_URL: nats://nats:4222
      HTTP_PORT: 8080
    ports:
      - "8081:8080"
    depends_on:
      order-db:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - saga-network
    restart: on-failure

  # ========================================
  # Inventory Service
  # ========================================
  inventory-service:
    build:
      context: .
      dockerfile: services/inventory/Dockerfile
    container_name: saga-inventory-service
    environment:
      DB_HOST: inventory-db
      DB_PORT: 5432
      DB_USER: inventory_user
      DB_PASSWORD: inventory_pass
      DB_NAME: inventory_db
      NATS_URL: nats://nats:4222
      HTTP_PORT: 8080
    ports:
      - "8082:8080"
    depends_on:
      inventory-db:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - saga-network
    restart: on-failure

  # ========================================
  # Payment Service
  # ========================================
  payment-service:
    build:
      context: .
      dockerfile: services/payment/Dockerfile
    container_name: saga-payment-service
    environment:
      DB_HOST: payment-db
      DB_PORT: 5432
      DB_USER: payment_user
      DB_PASSWORD: payment_pass
      DB_NAME: payment_db
      NATS_URL: nats://nats:4222
      HTTP_PORT: 8080
    ports:
      - "8083:8080"
    depends_on:
      payment-db:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - saga-network
    restart: on-failure

networks:
  saga-network:
    driver: bridge

volumes:
  order-db-data:
  inventory-db-data:
  payment-db-data:
